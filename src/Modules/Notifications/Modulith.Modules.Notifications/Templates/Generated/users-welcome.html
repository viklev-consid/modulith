<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "https://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html dir="ltr" lang="en">
  <head>
    <meta content="text/html; charset=UTF-8" http-equiv="Content-Type" />
    <meta name="x-apple-disable-message-reformatting" />
  </head>
  <body
    style='background-color:#f6f8fb;color:#172033;font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif'
  >
    <div
      style="display:none;overflow:hidden;line-height:1px;opacity:0;max-height:0;max-width:0"
    >
      Welcome to Modulith
    </div>
    <table
      align="center"
      width="100%"
      border="0"
      cellpadding="0"
      cellspacing="0"
      role="presentation"
      style="background-color:#ffffff;border:1px solid #d9e0ea;margin:32px auto;padding:32px;width:560px"
    >
      <tbody>
        <tr style="width:100%">
          <td>
            <table
              align="center"
              width="100%"
              border="0"
              cellpadding="0"
              cellspacing="0"
              role="presentation"
            >
              <tbody>
                <tr>
                  <td>
                    <h1
                      style="color:#172033;font-size:28px;font-weight:700;line-height:36px;margin:0 0 16px"
                    >
                      Welcome, {{displayName}}!
                    </h1>
                    <p
                      style="color:#40516b;font-size:16px;line-height:24px;margin:0"
                    >
                      Your account has been created. You can now sign in and
                      start using the platform.
                    </p>
                  </td>
                </tr>
              </tbody>
            </table>
          </td>
        </tr>
      </tbody>
    </table>
  </body>
</html>

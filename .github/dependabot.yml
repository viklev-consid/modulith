# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2

updates:
  # NuGet manifests are split across a modular monolith; use directory globs to
  # cover the root CPM/tool manifests plus current and future projects.
  - package-ecosystem: "nuget"
    directories:
      - "/"
      - "/src/**"
      - "/tests/**"
      - "/templates/**"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    groups:
      nuget-nonbreaking:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions must use the repository root; Dependabot scans .github/workflows.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:30"
      timezone: "UTC"
    open-pull-requests-limit: 5
    groups:
      github-actions-nonbreaking:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # global.json pins the .NET SDK version separately from NuGet packages.
  - package-ecosystem: "dotnet-sdk"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 2
